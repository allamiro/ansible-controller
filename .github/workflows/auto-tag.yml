name: Auto-tag

# Runs after every push to main that changes actual code or config.
# Pure documentation changes (README, issue templates, LICENSE) are excluded
# so they don't generate a new image version.
#
# Bump rules (conventional commits):
#   feat!: / BREAKING CHANGE  →  major  (v1.0.0 → v2.0.0)
#   feat:                      →  minor  (v1.0.0 → v1.1.0)
#   fix: / perf: / refactor:   →  patch  (v1.0.0 → v1.0.1)
#   anything else              →  patch  (default)
#
# The new tag triggers docker-publish.yml (versioned image push to Docker Hub
# + GHCR) and release.yml (GitHub Release with changelog) automatically.

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

jobs:
  tag:
    name: Bump version and push tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to find previous tag

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v

      - name: Summary
        run: |
          echo "Previous version : ${{ steps.tag.outputs.previous_tag }}"
          echo "New version      : ${{ steps.tag.outputs.new_tag }}"
          echo "Changelog        :"
          echo "${{ steps.tag.outputs.changelog }}"
